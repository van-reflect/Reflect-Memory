<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      padding: 20px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo img { width: 28px; height: 28px; border-radius: 6px; }
    .logo span { font-size: 15px; font-weight: 600; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .status.connected { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    .status.disconnected { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .status.connecting { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
    label { display: block; font-size: 12px; color: #a1a1aa; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #e4e4e7;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-outline {
      background: transparent;
      color: #e4e4e7;
      border: 1px solid #3f3f46;
    }
    .btn-secondary { background: #27272a; color: #a1a1aa; font-size: 13px; font-weight: 500; padding: 8px; }
    .btn + .btn { margin-top: 8px; }
    .auth-buttons { display: flex; flex-direction: column; gap: 8px; }
    .auth-buttons .btn { margin-top: 0; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      font-size: 11px;
      color: #52525b;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #27272a;
    }
    .manual-toggle {
      font-size: 12px;
      color: #71717a;
      cursor: pointer;
      text-align: center;
      padding: 6px 0;
      user-select: none;
    }
    .manual-toggle:hover { color: #a1a1aa; }
    .manual-section { display: none; margin-top: 8px; }
    .manual-section.open { display: block; }
    .info {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #27272a;
      font-size: 12px;
      color: #71717a;
      line-height: 1.5;
    }
    .info a { color: #60a5fa; text-decoration: underline; }
    .memory-count { font-size: 12px; color: #a1a1aa; margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="icons/icon-48.png" alt="Reflect Memory">
    <span>Reflect Memory</span>
  </div>

  <div id="status" class="status connecting">Checking connection...</div>

  <!-- Not connected: sign up / log in -->
  <div id="authView" class="hidden">
    <div class="auth-buttons">
      <button class="btn btn-primary" id="signupBtn">Sign Up</button>
      <button class="btn btn-outline" id="loginBtn">Log In</button>
    </div>

    <div class="divider">or</div>

    <div class="manual-toggle" id="manualToggle">Enter key manually</div>
    <div class="manual-section" id="manualSection">
      <label for="apiKey">Agent Key</label>
      <input type="password" id="apiKey" placeholder="rm_..." autocomplete="off">
      <button class="btn btn-secondary" id="saveBtn" style="margin-top: 8px;">Connect</button>
    </div>

    <div class="info">
      Sign up at <a href="https://reflectmemory.com" target="_blank">reflectmemory.com</a> and the extension connects automatically.
    </div>
  </div>

  <!-- Connected state -->
  <div id="connectedView" class="hidden">
    <div id="planInfo" class="memory-count"></div>
    <div id="memoryCount" class="memory-count"></div>
    <button class="btn btn-primary hidden" id="upgradeBtn">Upgrade to Pro</button>
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard</button>
    <button class="btn btn-secondary" id="disconnectBtn">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
