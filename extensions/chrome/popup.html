<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      padding: 20px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo img { width: 28px; height: 28px; border-radius: 6px; }
    .logo span { font-size: 15px; font-weight: 600; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .status.connected { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    .status.disconnected { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    label { display: block; font-size: 12px; color: #a1a1aa; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #e4e4e7;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #27272a; color: #a1a1aa; margin-top: 8px; }
    .info {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #27272a;
      font-size: 12px;
      color: #71717a;
      line-height: 1.5;
    }
    .memory-count { font-size: 12px; color: #a1a1aa; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="icons/icon-48.png" alt="Reflect Memory">
    <span>Reflect Memory</span>
  </div>

  <div id="status" class="status disconnected">Checking connection...</div>

  <div id="setup">
    <label for="apiKey">Agent Key</label>
    <input type="password" id="apiKey" placeholder="rm_..." autocomplete="off">
    <button class="btn btn-primary" id="saveBtn">Connect</button>
  </div>

  <div id="connected" style="display:none">
    <div id="memoryCount" class="memory-count"></div>
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard</button>
    <button class="btn btn-secondary" id="disconnectBtn">Disconnect</button>
  </div>

  <div class="info">
    Paste your agent key from <a href="https://reflectmemory.com/dashboard" target="_blank" style="color:#60a5fa;text-decoration:underline">reflectmemory.com/dashboard</a>.
    The extension silently syncs your memory across all AI tools.
  </div>

  <script src="popup.js"></script>
</body>
</html>
