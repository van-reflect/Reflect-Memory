apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "reflect-memory.fullname" . }}-default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "reflect-memory.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Start permissive for scaffold; tighten in hardening pass.
    - {}
