apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reflect-memory.fullname" . }}-env
type: Opaque
stringData:
  RM_API_KEY: {{ .Values.secrets.apiKey | quote }}
  RM_MODEL_NAME: {{ .Values.secrets.modelName | quote }}
  RM_MODEL_API_KEY: {{ .Values.secrets.modelApiKey | quote }}
  RM_MODEL_BASE_URL: {{ .Values.secrets.modelBaseUrl | quote }}
  RM_DASHBOARD_SERVICE_KEY: {{ .Values.secrets.dashboardServiceKey | quote }}
  RM_DASHBOARD_JWT_SECRET: {{ .Values.secrets.dashboardJwtSecret | quote }}
  RM_OWNER_EMAIL: {{ .Values.secrets.ownerEmail | quote }}
  RM_SSO_ENABLED: {{ .Values.secrets.ssoEnabled | quote }}
  RM_SSO_JWKS_URL: {{ .Values.secrets.ssoJwksUrl | quote }}
  RM_SSO_ISSUER: {{ .Values.secrets.ssoIssuer | quote }}
  RM_SSO_AUDIENCE: {{ .Values.secrets.ssoAudience | quote }}
